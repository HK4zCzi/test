name: CI — Test & Security Scan

on:
  push:
    branches: ["homework", "main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Job 1: Unit Tests ───────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       assets_db
          POSTGRES_USER:     user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/assets_db
          PYTHONPATH: .
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Security Scan (Bandit) ────────────────────────────────────
  security-bandit:
    name: Security scan (Bandit)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit==1.7.8

      - name: Run Bandit security scan
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json || true

      - name: Show Bandit summary
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            --exit-zero

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ── Job 3: Secret Detection (Gitleaks) ──────────────────────────────
  security-gitleaks:
    name: Secret detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 4: Docker Build Check ────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t easm-backend:ci -f Dockerfile .

      - name: Build frontend image
        run: docker build -t easm-frontend:ci -f Dockerfile.frontend .

      - name: Run Trivy vulnerability scan on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "easm-backend:ci"
          format: "table"
          exit-code: "0"           # don't fail on vuln, just report
          severity: "HIGH,CRITICAL"
