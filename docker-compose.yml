services:

  # ── PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: easm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       assets_db
      POSTGRES_USER:     user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d assets_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (FastAPI) ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easm-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (Nginx serving static HTML) ────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: easm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
